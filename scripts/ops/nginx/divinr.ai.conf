# divinr.ai — Web app
server {
    listen 80;
    server_name divinr.ai www.divinr.ai;
    root /var/www/divinr.ai;
    index index.html;

    # Common proxy headers for all /api/* locations
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Prefix-stripping API routes — frontend calls /api/<x>/..., API serves /<x>/...
    # The trailing slash on proxy_pass causes nginx to replace the matched prefix.
    location ^~ /api/auth/        { proxy_pass http://127.0.0.1:7100/auth/; }
    location ^~ /api/markets/     { proxy_pass http://127.0.0.1:7100/markets/; }
    location ^~ /api/billing/     { proxy_pass http://127.0.0.1:7100/billing/; }
    location ^~ /api/admin/       { proxy_pass http://127.0.0.1:7100/admin/; }
    location ^~ /api/attribution/ { proxy_pass http://127.0.0.1:7100/attribution/; }
    location ^~ /api/users/       { proxy_pass http://127.0.0.1:7100/users/; }
    location ^~ /api/onboarding/  { proxy_pass http://127.0.0.1:7100/onboarding/; }
    location ^~ /api/first-touch/ { proxy_pass http://127.0.0.1:7100/first-touch/; }

    # Generic catch-all — must be last. Routes like /api/mastery, /api/learning-panel,
    # /api/credentials, /api/config/public genuinely include /api/ in the API path.
    location /api/ {
        proxy_pass http://127.0.0.1:7100;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# api.divinr.ai — API + A2A
server {
    listen 80;
    server_name api.divinr.ai;

    location / {
        proxy_pass http://127.0.0.1:7100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}
