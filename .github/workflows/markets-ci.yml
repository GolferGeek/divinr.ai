name: markets-ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  markets-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -w run build

      - name: Planes contracts
        run: pnpm --filter @orchestratorai/planes run test

      - name: API unit tests
        run: pnpm --filter @divinr/api run test:unit
        # Note: test:compliance and test:markets are excluded from CI
        # because they bootstrap the full Nest app and require a local
        # Postgres on 127.0.0.1:54322. Run them locally with `pnpm test`.
