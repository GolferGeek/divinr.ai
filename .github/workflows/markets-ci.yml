name: markets-ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  markets-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -w run build

      - name: Planes contracts
        run: pnpm --filter @orchestratorai/planes run test

      - name: API unit tests
        run: pnpm --filter @divinr/api run test:unit
        # Note: test:compliance and test:markets:smoke are excluded from this
        # job because they bootstrap the full Nest app and require Postgres.
        # Smoke runs locally; the stub-driven integration suite runs in the
        # parallel `markets-integration` job below against a service container.

  markets-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Schema/code mismatch (MarketsService.createAnalyst ON CONFLICT (slug)
    # without a backing unique index) was fixed in the stage-keyed-analyst-
    # contracts effort; this job is now a hard gate again. A future
    # user-authored-custom-content effort may refine the uniqueness to
    # (slug, user_id) per master-intention §3.4 triple model.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 7011:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:7011/postgres
      POSTGRESQL_URL: postgresql://postgres:postgres@127.0.0.1:7011/postgres
      DB_PROVIDER: postgresql
      LLM_PROVIDER: simplified
      OBSERVABILITY_PROVIDER: console
      CONFIG_PROVIDER: local
      MARKETS_DEV_AUTH_BYPASS: 'true'
      MARKETS_ENABLE_LLM: 'true'
      MARKETS_DISABLE_PREDICTION_GENERATION: 'false'
      API_PORT: '3100'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace deps and API for the runner
        run: pnpm --filter @orchestratorai/planes... --filter @divinr/prediction-planes... --filter @divinr/api run build

      - name: Bootstrap API schema
        run: pnpm --filter @divinr/api run bootstrap:schema

      - name: Markets integration suite
        run: pnpm --filter @divinr/api run test:markets:integration
